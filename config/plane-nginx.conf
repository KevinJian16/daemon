worker_processes 4;

events {
  worker_connections 1024;
}

http {
  include mime.types;

  default_type  application/octet-stream;

  set_real_ip_from        0.0.0.0/0;
  real_ip_recursive       on;
  real_ip_header          X-Forward-For;
  limit_req_zone          $binary_remote_addr zone=mylimit:10m rate=10r/s;

  access_log /dev/stdout;
  error_log /dev/stderr;

  # Extract csrftoken from Cookie header so nginx can inject it as X-CSRFToken.
  # This allows CSRF_COOKIE_HTTPONLY=True while satisfying Django's double-submit check.
  map $http_cookie $csrf_token {
    default                          "";
    "~*csrftoken=(?<t>[^;]+)"        $t;
  }

  server {
    listen 3000;

    # Frontend static files
    location / {
      root   /usr/share/nginx/html;
      index  index.html index.htm;
      try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Plane API backend
    location /api/ {
      proxy_pass http://plane-api:8000/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CSRFToken $csrf_token;
      proxy_set_header Origin http://localhost:3000;
      proxy_connect_timeout 30s;
      proxy_read_timeout 300s;
    }

    location /auth/ {
      proxy_pass http://plane-api:8000/auth/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CSRFToken $csrf_token;
      proxy_set_header Origin http://localhost:3000;
      proxy_set_header Referer http://localhost:3000;
    }

    location /uploads/ {
      proxy_pass http://minio:9000/uploads/;
    }

    # Admin panel (god-mode)
    location /god-mode/ {
      proxy_pass http://plane-admin:3000/god-mode/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
