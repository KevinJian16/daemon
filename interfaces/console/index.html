<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daemon Console</title>
<link rel="stylesheet" href="/_console/console.css">
</head>
<body>
<header id="header">
  <h1 id="h-title">Daemon Console</h1>
  <span id="ward-badge" class="ward"></span>
  <span id="header-summary" class="header-meta"></span>
  <div class="header-spacer"></div>
  <button onclick="toggleConsoleLang()" id="c-lang-btn" class="header-btn">EN</button>
  <a href="/portal/" class="header-btn">Portal</a>
</header>
<nav id="nav"></nav>
<main id="main">
  <div id="list-view"></div>
  <div id="detail-view" class="detail-hidden">
    <div class="detail-bar">
      <button onclick="popDetail()" class="back-btn">&larr;</button>
      <span id="detail-title"></span>
    </div>
    <div id="detail-body"></div>
  </div>
</main>
<div id="confirm-overlay" class="overlay hidden">
  <div class="confirm-box">
    <h4 id="confirm-title"></h4>
    <p id="confirm-msg"></p>
    <div class="confirm-btns">
      <button class="btn ghost" id="confirm-no"></button>
      <button class="btn warn" id="confirm-yes"></button>
    </div>
  </div>
</div>
<script src="/_console/js/core.js"></script>
<script src="/_console/js/panels/overview.js"></script>
<script src="/_console/js/panels/routines.js"></script>
<script src="/_console/js/panels/trails.js"></script>
<script src="/_console/js/panels/model.js"></script>
<script src="/_console/js/panels/agents.js"></script>
<script src="/_console/js/panels/norm.js"></script>
<script src="/_console/js/panels/endeavors.js"></script>
<script src="/_console/js/panels/lexicon.js"></script>
<script src="/_console/js/panels/system.js"></script>
<script src="/_console/js/bootstrap.js"></script>
</body>
</html>
