<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daemon</title>
<link rel="stylesheet" href="./portal.css">
</head>
<body>
<div id="app">

<!-- ── Sidebar ── -->
<aside id="sidebar">
  <div id="sb-header">
    <span id="brand">Daemon</span>
    <span id="gate-dot" title="Gate: GREEN"></span>
    <button class="icon-btn" id="lang-btn" onclick="toggleLang()">EN</button>
    <a class="icon-btn" href="/console/" id="console-link" onclick="try{const raw=localStorage.getItem('d_console_view_state');const panel=String((raw?JSON.parse(raw):{}).panel||'').trim();const allow=['overview','lexicon','spine','fabric','norm','traces','strategies','model','agents','skill-evolution','schedules','campaigns','system'];this.href=allow.includes(panel)?('/console/?panel='+encodeURIComponent(panel)):'/console/';}catch(_){this.href='/console/';}">Console</a>
    <button class="icon-btn" id="compose-btn" onclick="showCompose()" title="新建运行">✏</button>
  </div>

  <nav id="sb-nav">
    <div class="nav-section" id="sec-pending">
      <div class="nav-section-label">
        <span data-i18n="pending">待处理</span>
        <span class="pending-badge" id="pending-badge" style="display:none"></span>
      </div>
      <div id="pending-list"><div class="nav-empty" data-i18n="none">暂无</div></div>
    </div>

    <div class="nav-section" id="sec-running">
      <div class="nav-section-label" data-i18n="running">进行中</div>
      <div id="running-list"><div class="nav-empty" data-i18n="none">暂无</div></div>
    </div>

    <div class="nav-section" id="sec-history">
      <div class="nav-section-label">
        <span data-i18n="history">历史</span>
      </div>
      <div id="history-search-wrap" style="padding:2px 10px 6px">
        <input id="history-search" type="search"
          placeholder="搜索…" data-ph-zh="搜索…" data-ph-en="Search…"
          oninput="filterHistory(this.value)"
          style="width:100%;background:var(--hover);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:12px;color:var(--text);outline:none;transition:border-color .15s"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
      </div>
      <div id="history-groups"></div>
    </div>
  </nav>
</aside>

<!-- ── Main ── -->
<main id="main">

  <!-- Compose view -->
  <div id="view-compose" style="display:flex;flex-direction:column;flex:1;overflow:hidden;align-items:center">
    <div id="compose-scroll" style="flex:1;overflow-y:auto;width:100%;display:flex;flex-direction:column;align-items:center">
      <div id="compose-empty">
        <div style="height:15vh"></div>
        <div style="text-align:center;pointer-events:none">
          <div style="font-size:24px;font-weight:600;letter-spacing:-.3px;margin-bottom:6px" data-i18n="composeTitle">需要做什么？</div>
          <div style="font-size:14px;color:var(--muted);max-width:560px;line-height:1.6;margin:0 auto;text-wrap:balance" data-i18n="composeHint">描述你的目标，系统自动判断为 Pulse/Thread/Campaign 并分配 agent。</div>
        </div>
      </div>
      <div id="chat-history" style="width:100%;max-width:680px;padding:16px 20px 0;display:flex;flex-direction:column;gap:10px"></div>
      <div id="plan-card" style="width:100%;max-width:680px;margin:8px 20px 0;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;display:none">
        <div id="plan-card-hdr" style="padding:8px 14px;background:var(--hover);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:6px">
          <span>⚡</span><span data-i18n="planDetected">检测到运行计划</span>
        </div>
        <div style="padding:12px 14px">
          <div id="plan-summary" style="font-size:13px;line-height:1.5"></div>
          <div id="plan-scale" style="font-size:11px;color:var(--muted);margin-top:3px"></div>
          <div style="display:flex;gap:8px;margin-top:10px">
            <button class="btn btn-primary btn-sm" id="plan-ok-btn" onclick="submitPlan()" data-i18n="submitPlan">确认提交</button>
            <button class="btn btn-ghost btn-sm" onclick="dismissPlan()" data-i18n="rewrite">重新描述</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div style="width:100%;max-width:680px;padding:8px 20px 28px;flex-shrink:0">
      <div id="compose-box">
        <div id="compose-file-chips"></div>
        <textarea id="compose-textarea" rows="1"
          placeholder="描述你的目标…"
          data-ph-zh="描述你的目标…" data-ph-en="Describe your objective…"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();composeSend()}"
          oninput="autoResize(this)"></textarea>
        <div id="compose-actions">
          <button id="compose-attach-btn" id="attach-btn" onclick="document.getElementById('compose-file-input').click()">📎</button>
          <input type="file" id="compose-file-input" multiple onchange="onFilesSelected(this)">
          <button id="compose-send-btn" class="btn btn-primary btn-sm" onclick="composeSend()" data-i18n="send">发送</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail view -->
  <div id="view-detail" style="display:none;flex:1;flex-direction:column;overflow:hidden">
    <div id="det-header">
      <div id="det-title"></div>
      <div id="det-meta">
        <span id="det-status" class="sbadge"></span>
        <span id="det-scale" class="scale-tag" style="display:none"></span>
        <span id="det-time" class="det-time"></span>
      </div>
    </div>
    <div id="det-controls" class="hidden">
      <button class="btn btn-ghost btn-sm" id="btn-pause" onclick="runPause()" style="display:none" data-i18n="pause">暂停</button>
      <button class="btn btn-ghost btn-sm" id="btn-redirect" onclick="runRedirect()" style="display:none" data-i18n="redirect">调整方向</button>
      <button class="btn btn-danger btn-sm" id="btn-cancel" onclick="runCancel()" style="display:none" data-i18n="cancel">取消</button>
    </div>
    <div id="det-body">
      <div id="ms-timeline" style="display:none">
        <h3 data-i18n="milestones">Milestone 进度</h3>
        <div id="ms-list"></div>
      </div>
      <div id="prog-wrap" style="display:none">
        <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px" id="prog-label"></div>
      </div>
      <div id="output-body"></div>
      <div id="rating-wrap" style="display:none">
        <h3 data-i18n="rateTitle">这个结果怎么样？</h3>
        <div id="rating-existing"></div>
        <div id="q-choices">
          <button class="q-choice" data-v="5" data-zh="超出预期" data-en="Exceeded expectations" onclick="pickChoice(this)">超出预期</button>
          <button class="q-choice" data-v="4" data-zh="满足需求" data-en="Met needs" onclick="pickChoice(this)">满足需求</button>
          <button class="q-choice" data-v="2" data-zh="偏浅了" data-en="Too shallow" onclick="pickChoice(this)">偏浅了</button>
          <button class="q-choice" data-v="1" data-zh="不满意" data-en="Not satisfied" onclick="pickChoice(this)">不满意</button>
        </div>
        <div id="rating-row">
          <button class="btn btn-primary btn-sm" id="rating-ok-btn" onclick="submitRating()" disabled data-i18n="submitRating">提交评价</button>
          <button id="rating-deep-btn" onclick="toggleDeep()" data-i18n="deepFeedback">详细评价</button>
          <span id="rating-status"></span>
        </div>
        <div id="deep-wrap">
          <textarea id="deep-note"
            data-ph-zh="写一段详细评价：哪里做得好、哪里需要改进…"
            data-ph-en="Write detailed feedback: what worked, what needs improvement…"
            placeholder="写一段详细评价：哪里做得好、哪里需要改进…"
            oninput="refreshRatingSubmitEnabled()"></textarea>
        </div>
        <div id="append-wrap">
          <h4 data-i18n="appendTitle">追加评价</h4>
          <div id="rating-history"></div>
          <textarea id="append-note"
            data-ph-zh="补充一段后续评价（例如新发现、修正建议、长期效果）…"
            data-ph-en="Add follow-up feedback (new findings, correction suggestions, long-term effects)…"
            placeholder="补充一段后续评价…"></textarea>
          <div id="append-row">
            <button class="btn btn-ghost btn-sm" id="append-ok-btn" onclick="submitAppend()" data-i18n="appendSubmit">追加评价</button>
            <span id="append-status"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

</main>
</div>

<script src="./js/i18n.js"></script>
<script src="./js/api.js"></script>
<script src="./js/views.js"></script>
<script src="./js/sync.js"></script>
<script src="./js/run_list.js"></script>
<script src="./js/review.js"></script>
<script src="./js/controls.js"></script>
<script src="./js/compose.js"></script>
<script src="./js/history.js"></script>
<script src="./js/bootstrap.js"></script>
</body>
</html>
