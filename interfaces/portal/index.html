<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daemon Portal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #21263a;
    --border: #2a2d3a; --text: #e2e8f0; --muted: #94a3b8;
    --accent: #6366f1; --green: #10b981; --yellow: #f59e0b; --red: #ef4444;
    --font: -apple-system, 'Segoe UI', sans-serif;
    --mono: 'SF Mono', 'Fira Code', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; height: 100vh; display: flex; flex-direction: column; }
  header { display: flex; align-items: center; gap: 12px; padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  header h1 { font-size: 18px; font-weight: 700; color: var(--accent); }
  #gate-badge { padding: 3px 10px; border-radius: 4px; font-weight: 700; font-size: 11px; font-family: var(--mono); }
  .GREEN { background: #064e3b; color: var(--green); }
  .YELLOW { background: #451a03; color: var(--yellow); }
  .RED { background: #450a0a; color: var(--red); }
  nav { display: flex; gap: 2px; padding: 8px 24px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  nav button { background: none; border: none; color: var(--muted); padding: 6px 16px; cursor: pointer; border-radius: 4px; font-size: 13px; }
  nav button.active, nav button:hover { background: var(--border); color: var(--text); }
  .panel { display: none; flex: 1; overflow: hidden; }
  .panel.active { display: flex; flex-direction: column; }
  /* Chat */
  #chat-layout { display: flex; flex: 1; overflow: hidden; }
  #chat-main { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  #messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 700px; padding: 10px 14px; border-radius: 8px; line-height: 1.6; font-size: 14px; }
  .msg.user { align-self: flex-end; background: var(--accent); color: white; border-radius: 8px 8px 2px 8px; }
  .msg.assistant { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-radius: 8px 8px 8px 2px; }
  .msg.system { align-self: center; color: var(--muted); font-size: 12px; background: none; padding: 4px; }
  .msg pre { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 4px; overflow-x: auto; font-family: var(--mono); font-size: 12px; margin-top: 8px; }
  #input-row { display: flex; gap: 8px; padding: 16px 24px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  #chat-input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 6px; font-size: 14px; resize: none; font-family: var(--font); min-height: 44px; max-height: 120px; }
  #chat-input:focus { outline: none; border-color: var(--accent); }
  button.send { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
  button.send:hover { opacity: 0.85; }
  button.send:disabled { opacity: 0.4; cursor: default; }
  #plan-sidebar { width: 300px; border-left: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; flex-shrink: 0; }
  #plan-sidebar h3 { padding: 14px 16px; border-bottom: 1px solid var(--border); color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  #plan-display { flex: 1; overflow-y: auto; padding: 12px; }
  #plan-display pre { font-family: var(--mono); font-size: 11px; color: #a5f3fc; background: #0a0c12; padding: 12px; border-radius: 4px; white-space: pre-wrap; }
  #submit-plan-btn { margin: 12px; background: var(--green); color: #022c22; border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-weight: 700; font-size: 13px; }
  #submit-plan-btn:disabled { opacity: 0.4; cursor: default; }
  /* Outcomes */
  #panel-outcomes { flex-direction: column; overflow: hidden; }
  #outcomes-layout { display: flex; flex: 1; overflow: hidden; }
  #outcomes-list { width: 340px; border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
  .outcome-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .outcome-item:hover, .outcome-item.selected { background: var(--surface2); }
  .outcome-item .title { font-weight: 600; margin-bottom: 4px; }
  .outcome-item .meta { color: var(--muted); font-size: 11px; }
  #outcomes-preview { flex: 1; overflow-y: auto; padding: 24px; }
  #outcomes-preview .empty { color: var(--muted); text-align: center; padding-top: 60px; }
  #preview-content { font-size: 14px; line-height: 1.7; }
  #preview-content h1 { font-size: 20px; margin-bottom: 12px; }
  #preview-content h2 { font-size: 16px; margin: 16px 0 8px; color: var(--accent); }
  #preview-content h3 { font-size: 14px; margin: 12px 0 6px; color: var(--muted); }
  #preview-content p { margin-bottom: 10px; }
  #preview-content ul, #preview-content ol { margin: 8px 0 8px 24px; }
  #preview-content li { margin-bottom: 4px; }
  #preview-content code { background: #0a0c12; padding: 2px 6px; border-radius: 3px; font-family: var(--mono); font-size: 12px; }
  #preview-content pre { background: #0a0c12; padding: 14px; border-radius: 4px; overflow-x: auto; font-family: var(--mono); font-size: 12px; margin: 10px 0; }
  /* Tasks */
  #panel-tasks { flex-direction: column; overflow: hidden; }
  #tasks-toolbar { display: flex; gap: 8px; padding: 14px 24px; border-bottom: 1px solid var(--border); align-items: center; flex-shrink: 0; }
  #tasks-toolbar select, #tasks-toolbar input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 4px; font-size: 12px; }
  #tasks-body { flex: 1; overflow-y: auto; padding: 0 24px 24px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; color: var(--muted); font-size: 11px; text-transform: uppercase; padding: 10px 8px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); }
  td { padding: 10px 8px; border-bottom: 1px solid var(--border); font-size: 13px; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 600; font-family: var(--mono); }
  .running { background: #1e1b4b; color: #a5b4fc; }
  .ok, .done, .completed { background: #064e3b; color: var(--green); }
  .error, .failed { background: #450a0a; color: var(--red); }
  .queued, .pending { background: #27272a; color: var(--muted); }
  .degraded { background: #451a03; color: var(--yellow); }
  button.sm { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 11px; }
  button.sm:hover { color: var(--text); border-color: var(--accent); }
  /* Feedback trigger */
  #feedback-trigger { margin-top: 20px; display: none; }
  #feedback-trigger button { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: border-color .15s, color .15s; }
  #feedback-trigger button:hover { color: var(--text); border-color: var(--accent); }
  /* Feedback modal */
  #feedback-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 100; align-items: center; justify-content: center; }
  #feedback-modal.open { display: flex; }
  #fmodal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: min(560px, 94vw); padding: 32px; display: flex; flex-direction: column; gap: 24px; position: relative; }
  #fmodal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; }
  #fmodal-close:hover { color: var(--text); }
  #fmodal-progress { font-size: 11px; color: var(--muted); font-family: var(--mono); letter-spacing: 1px; }
  #fmodal-question { font-size: 18px; font-weight: 600; line-height: 1.4; }
  #fmodal-options { display: flex; flex-direction: column; gap: 10px; }
  .fopt { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; cursor: pointer; transition: border-color .15s, background .15s; }
  .fopt:hover { border-color: var(--accent); background: rgba(99,102,241,.08); }
  .fopt.selected { border-color: var(--accent); background: rgba(99,102,241,.15); }
  .fopt-label { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
  .fopt-desc { font-size: 12px; color: var(--muted); }
  #fmodal-final { display: none; flex-direction: column; gap: 12px; }
  #fmodal-comment { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 6px; font-size: 13px; resize: vertical; min-height: 64px; font-family: var(--font); }
  #fmodal-comment:focus { outline: none; border-color: var(--accent); }
  #fmodal-actions { display: flex; gap: 10px; align-items: center; }
  #fmodal-submit { background: var(--accent); color: white; border: none; padding: 9px 22px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
  #fmodal-submit:disabled { opacity: .4; cursor: default; }
  #fmodal-back { background: none; border: 1px solid var(--border); color: var(--muted); padding: 9px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  #fmodal-back:hover { color: var(--text); }
  #fmodal-status { font-size: 13px; }
</style>
</head>
<body>
<header>
  <h1>Daemon</h1>
  <span id="gate-badge" class="GREEN">GREEN</span>
  <span style="color:var(--muted);font-size:12px;margin-left:8px" id="header-status"></span>
</header>

<nav>
  <button class="active" onclick="show('chat', this)">Chat</button>
  <button onclick="show('outcomes', this)">Outcomes</button>
  <button onclick="show('timeline', this)">Timeline</button>
  <button onclick="show('tasks', this)">Tasks</button>
</nav>

<!-- CHAT -->
<div id="panel-chat" class="panel active">
  <div id="chat-layout">
    <div id="chat-main">
      <div id="messages">
        <div class="msg system">Start a conversation with the Daemon Router.</div>
      </div>
      <div id="input-row">
        <textarea id="chat-input" placeholder="Describe what you need…" rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
          oninput="autoResize(this)"></textarea>
        <button class="send" id="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
    <div id="plan-sidebar">
      <h3>Detected Plan</h3>
      <div id="plan-display"><p style="color:var(--muted);font-size:12px;padding:8px">No plan detected yet. The Router will extract a structured plan from your conversation.</p></div>
      <button id="submit-plan-btn" disabled onclick="submitDetectedPlan()">Submit Plan</button>
    </div>
  </div>
</div>

<!-- OUTCOMES -->
<div id="panel-outcomes" class="panel">
  <div id="outcomes-layout">
    <div id="outcomes-list">
      <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <span style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:1px">Outcomes</span>
        <button class="sm" style="margin-left:auto" onclick="loadOutcomes()">↻</button>
      </div>
      <div id="outcomes-items"><div style="padding:20px;color:var(--muted);font-size:12px">Loading…</div></div>
    </div>
    <div id="outcomes-preview">
      <div class="empty" id="preview-empty">Select an outcome to view</div>
      <div id="preview-content" style="display:none"></div>
      <div id="feedback-trigger">
        <button onclick="openFeedbackModal()">✦ Rate this outcome</button>
      </div>
    </div>
  </div>
</div>

<!-- TIMELINE -->
<div id="panel-timeline" class="panel">
  <div id="timeline-toolbar" style="display:flex;gap:8px;padding:14px 24px;border-bottom:1px solid var(--border);align-items:center;flex-shrink:0;">
    <span style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:1px">Timeline (Last 30 days)</span>
    <button class="sm" style="margin-left:auto" onclick="loadTimeline()">↻ Refresh</button>
  </div>
  <div id="timeline-body" style="flex:1;overflow-y:auto;padding:0 24px 24px;">
    <div id="timeline-groups" style="display:flex;flex-direction:column;gap:12px;padding-top:12px;">
      <div style="color:var(--muted);font-size:12px">Loading…</div>
    </div>
  </div>
</div>

<!-- TASKS -->
<div id="panel-tasks" class="panel">
  <div id="tasks-toolbar">
    <select id="task-status-filter" onchange="loadTasks()">
      <option value="">All statuses</option>
      <option value="running">Running</option>
      <option value="queued">Queued</option>
      <option value="completed">Completed</option>
      <option value="failed">Failed</option>
    </select>
    <button class="sm" onclick="loadTasks()">↻ Refresh</button>
    <span style="margin-left:auto;color:var(--muted);font-size:11px" id="tasks-count"></span>
  </div>
  <div id="tasks-body">
    <table>
      <thead><tr><th>Task ID</th><th>Type</th><th>Title</th><th>Status</th><th>Priority</th><th>Submitted</th></tr></thead>
      <tbody id="tasks-tbody"></tbody>
    </table>
  </div>
</div>

<!-- FEEDBACK MODAL -->
<div id="feedback-modal">
  <div id="fmodal-box">
    <button id="fmodal-close" onclick="closeFeedbackModal()">✕</button>
    <div id="fmodal-progress"></div>
    <div id="fmodal-question"></div>
    <div id="fmodal-options"></div>
    <div id="fmodal-final">
      <div style="font-size:13px;color:var(--muted)">任何补充想法？（选填）</div>
      <textarea id="fmodal-comment" placeholder="具体说说哪里好、哪里需要改进…"></textarea>
      <div id="fmodal-actions">
        <button id="fmodal-back" onclick="fbBack()">← 返回</button>
        <button id="fmodal-submit" onclick="submitFeedback()">提交反馈</button>
        <span id="fmodal-status"></span>
      </div>
    </div>
  </div>
</div>

<script>
const API = '';
let sessionId = null;
let detectedPlan = null;
let currentTaskId = null;

// ── Utilities ─────────────────────────────────────────────────────────────────

async function apiFetch(path, opts) {
  const r = await fetch(API + path, opts);
  if (!r.ok) { const t = await r.text(); throw new Error(t || r.status); }
  return r.json();
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function formatMd(md) {
  // Minimal markdown renderer: headers, bold, code blocks, inline code, lists.
  let html = esc(md);
  html = html.replace(/```([^```]*?)```/gs, (_, c) => `<pre>${c}</pre>`);
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  html = html.replace(/\n\n/g, '</p><p>');
  return '<p>' + html + '</p>';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function show(panel, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + panel).classList.add('active');
  if (el) el.classList.add('active');
  if (panel === 'outcomes') loadOutcomes();
  else if (panel === 'timeline') loadTimeline();
  else if (panel === 'tasks') loadTasks();
}

// ── Gate status ───────────────────────────────────────────────────────────────

async function checkGate() {
  try {
    const d = await apiFetch('/health');
    const gate = d.gate || 'GREEN';
    const badge = document.getElementById('gate-badge');
    badge.textContent = gate;
    badge.className = gate;
  } catch(e) {
    document.getElementById('gate-badge').textContent = '?';
  }
}

// ── Chat ──────────────────────────────────────────────────────────────────────

async function ensureSession() {
  if (sessionId) return;
  const d = await apiFetch('/chat/session', {method:'POST'});
  sessionId = d.session_id;
}

function appendMsg(role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'assistant') {
    div.innerHTML = formatMd(content);
  } else if (role === 'system') {
    div.textContent = content;
    div.style.fontStyle = 'italic';
  } else {
    div.textContent = content;
  }
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({behavior: 'smooth'});
  return div;
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  appendMsg('user', msg);
  const thinking = appendMsg('system', '…');

  try {
    await ensureSession();
    const d = await apiFetch(`/chat/${sessionId}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg}),
    });
    thinking.remove();
    appendMsg('assistant', d.content || '(no response)');

    if (d.plan) {
      detectedPlan = d.plan;
      showPlan(d.plan);
    }
  } catch(e) {
    thinking.remove();
    appendMsg('system', '✗ Error: ' + e.message);
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

function showPlan(plan) {
  const display = document.getElementById('plan-display');
  display.innerHTML = `<pre>${esc(JSON.stringify(plan, null, 2))}</pre>`;
  document.getElementById('submit-plan-btn').disabled = false;
}

async function submitDetectedPlan() {
  if (!detectedPlan) return;
  const btn = document.getElementById('submit-plan-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting…';
  try {
    const d = await apiFetch('/submit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(detectedPlan),
    });
    appendMsg('system', `✓ Plan submitted — task_id: ${d.task_id}`);
    detectedPlan = null;
    document.getElementById('plan-display').innerHTML = '<p style="color:var(--muted);font-size:12px;padding:8px">Plan submitted successfully.</p>';
  } catch(e) {
    appendMsg('system', '✗ Submit failed: ' + e.message);
    btn.disabled = false;
  }
  btn.textContent = 'Submit Plan';
}

// ── Outcomes ──────────────────────────────────────────────────────────────────

async function loadOutcomes() {
  const container = document.getElementById('outcomes-items');
  container.innerHTML = '<div style="padding:20px;color:var(--muted);font-size:12px">Loading…</div>';
  try {
    const items = await apiFetch('/outcome?limit=50');
    if (!items.length) {
      container.innerHTML = '<div style="padding:20px;color:var(--muted);font-size:12px">No outcomes yet</div>';
      return;
    }
    container.innerHTML = items.map((o, i) => `
      <div class="outcome-item" data-path-key="${encodeURIComponent(String(o.path||''))}" data-task-id="${esc(o.task_id||'')}" onclick="viewOutcome('${encodeURIComponent(String(o.path||''))}', this)">
        <div class="title">${esc(o.title || o.task_id || '—')}</div>
        <div class="meta">${esc(o.task_type || '')} · ${((o.delivered_utc||o.archived_utc||'').replace('T',' ').replace('Z',''))}</div>
      </div>`).join('');
  } catch(e) {
    container.innerHTML = `<div style="padding:20px;color:var(--red);font-size:12px">Error: ${esc(e.message)}</div>`;
  }
}

async function viewOutcome(pathKey, el) {
  const path = decodeURIComponent(pathKey || '');
  document.querySelectorAll('.outcome-item').forEach(i => i.classList.remove('selected'));
  if (el) el.classList.add('selected');

  // Track task_id for feedback.
  currentTaskId = el ? (el.dataset.taskId || null) : null;

  const empty = document.getElementById('preview-empty');
  const content = document.getElementById('preview-content');
  const trigger = document.getElementById('feedback-trigger');
  empty.style.display = 'none';
  content.style.display = 'block';
  content.innerHTML = '<p style="color:var(--muted)">Loading…</p>';
  trigger.style.display = 'none';

  try {
    const normalized = path.replace(/^\//, '').replace(/\/+$/, '');

    // Prefer HTML preview.
    const htmlResp = await fetch(API + '/outcome/' + normalized + '/report.html');
    if (htmlResp.ok) {
      const html = await htmlResp.text();
      content.innerHTML = '';
      const frame = document.createElement('iframe');
      frame.style.width = '100%';
      frame.style.height = '70vh';
      frame.style.border = '1px solid var(--border)';
      frame.style.borderRadius = '6px';
      frame.style.background = 'white';
      frame.srcdoc = html;
      content.appendChild(frame);
    } else {
      const mdResp = await fetch(API + '/outcome/' + normalized + '/report.md');
      if (mdResp.ok) {
        const md = await mdResp.text();
        content.innerHTML = formatMd(md);
      } else {
        const mr = await fetch(API + '/outcome/' + normalized + '/manifest.json');
        if (mr.ok) {
          const manifest = await mr.json();
          // Fill task_id from manifest if not already set.
          if (!currentTaskId && manifest.task_id) currentTaskId = manifest.task_id;
          content.innerHTML = `<pre>${esc(JSON.stringify(manifest, null, 2))}</pre>`;
        } else {
          content.innerHTML = '<p style="color:var(--muted)">No preview available</p>';
        }
      }
    }
    // Show feedback trigger whenever there is something to rate.
    if (currentTaskId) trigger.style.display = 'block';
  } catch(e) {
    content.innerHTML = `<p style="color:var(--red)">Error: ${esc(e.message)}</p>`;
  }
}

async function loadTimeline() {
  const container = document.getElementById('timeline-groups');
  container.innerHTML = '<div style="color:var(--muted);font-size:12px">Loading…</div>';
  try {
    const data = await apiFetch('/outcome/timeline?days=30&limit_per_day=40');
    const groups = data.days || [];
    if (!groups.length) {
      container.innerHTML = '<div style="color:var(--muted);font-size:12px">No outcomes in timeline yet</div>';
      return;
    }
    container.innerHTML = groups.map(g => {
      const items = g.items || [];
      const rows = items.map(o => {
        const pathKey = encodeURIComponent(String(o.path || ''));
        return `
          <tr>
            <td><button class="sm" onclick="openOutcomeFromTimeline('${pathKey}')">Open</button></td>
            <td>${esc(o.title || o.task_id || '—')}</td>
            <td style="color:var(--muted)">${esc(o.task_type || '')}</td>
            <td style="color:var(--muted)">${((o.delivered_utc||'').replace('T',' ').replace('Z',''))}</td>
          </tr>`;
      }).join('');
      return `
        <div style="border:1px solid var(--border);border-radius:8px;background:var(--surface);overflow:hidden">
          <div style="padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
            <strong>${esc(g.day || 'unknown')}</strong>
            <span style="color:var(--muted);font-size:11px">${items.length} items</span>
          </div>
          <table>
            <thead><tr><th>Action</th><th>Title</th><th>Type</th><th>Delivered</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="4" style="color:var(--muted)">No items</td></tr>'}</tbody>
          </table>
        </div>`;
    }).join('');
  } catch (e) {
    container.innerHTML = `<div style="color:var(--red);font-size:12px">Error: ${esc(e.message)}</div>`;
  }
}

async function openOutcomeFromTimeline(pathKey) {
  const outcomesTab = document.querySelectorAll('nav button')[1];
  show('outcomes', outcomesTab);
  await loadOutcomes();
  const items = Array.from(document.querySelectorAll('.outcome-item'));
  const target = items.find(n => n.dataset.pathKey === pathKey);
  if (target) {
    target.click();
    return;
  }
  await viewOutcome(pathKey, null);
}

// ── Tasks ─────────────────────────────────────────────────────────────────────

async function loadTasks() {
  const status = document.getElementById('task-status-filter').value;
  let url = '/tasks?limit=100';
  if (status) url += '&status=' + status;
  const tbody = document.getElementById('tasks-tbody');
  tbody.innerHTML = '<tr><td colspan="6" style="color:var(--muted);padding:20px">Loading…</td></tr>';
  try {
    const tasks = await apiFetch(url);
    document.getElementById('tasks-count').textContent = tasks.length + ' tasks';
    if (!tasks.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="color:var(--muted);padding:20px">No tasks</td></tr>';
      return;
    }
    tbody.innerHTML = [...tasks].reverse().map(t => `
      <tr>
        <td style="font-family:var(--mono);font-size:11px;color:var(--muted)">${esc(t.task_id)}</td>
        <td style="color:var(--muted)">${esc(t.task_type||'—')}</td>
        <td>${esc(t.title||'—')}</td>
        <td><span class="badge ${esc(t.status||'')}">${esc(t.status||'—')}</span></td>
        <td style="color:var(--muted)">${t.priority||'—'}</td>
        <td style="color:var(--muted);font-size:11px">${(t.submitted_utc||'').replace('T',' ').replace('Z','')}</td>
      </tr>`).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="6" style="color:var(--red)">Error: ${esc(e.message)}</td></tr>`;
  }
}

// ── Feedback Q&A ──────────────────────────────────────────────────────────────

let fbQuestions = [];
let fbStep = 0;
let fbAnswers = {};

async function openFeedbackModal() {
  if (!currentTaskId) return;
  fbStep = 0;
  fbAnswers = {};
  fbQuestions = [];

  // Reset modal state.
  document.getElementById('fmodal-final').style.display = 'none';
  document.getElementById('fmodal-options').style.display = 'flex';
  document.getElementById('fmodal-question').style.display = 'block';
  document.getElementById('fmodal-comment').value = '';
  document.getElementById('fmodal-status').textContent = '';
  document.getElementById('fmodal-submit').disabled = false;
  document.getElementById('fmodal-submit').textContent = '提交反馈';
  document.getElementById('feedback-modal').classList.add('open');

  // Show loading state while questions are generated.
  document.getElementById('fmodal-progress').textContent = '正在生成问题…';
  document.getElementById('fmodal-question').textContent = '';
  document.getElementById('fmodal-options').innerHTML =
    '<div style="color:var(--muted);font-size:13px;padding:8px 0">正在根据这份产出生成专属反馈问题，请稍候…</div>';

  try {
    fbQuestions = await apiFetch(`/feedback/${encodeURIComponent(currentTaskId)}/questions`);
  } catch(e) {
    document.getElementById('fmodal-options').innerHTML =
      `<div style="color:var(--red);font-size:13px">加载问题失败: ${esc(e.message)}</div>`;
    return;
  }
  renderFbStep();
}

function closeFeedbackModal() {
  document.getElementById('feedback-modal').classList.remove('open');
}

function renderFbStep() {
  const q = fbQuestions[fbStep];
  const total = fbQuestions.length;
  document.getElementById('fmodal-progress').textContent = `问题 ${fbStep + 1} / ${total}`;
  document.getElementById('fmodal-question').textContent = q.q;
  const opts = document.getElementById('fmodal-options');
  opts.innerHTML = q.opts.map((o, i) => `
    <div class="fopt" onclick="fbSelect(${i})">
      <div class="fopt-label">${esc(o.label)}</div>
      <div class="fopt-desc">${esc(o.desc)}</div>
    </div>`).join('');
}

function fbSelect(optIdx) {
  const q = fbQuestions[fbStep];
  const opt = q.opts[optIdx];
  fbAnswers[q.key] = opt.val;
  if (q.isRating) fbAnswers._rating = opt.val;

  // Briefly highlight selection then advance.
  const cards = document.querySelectorAll('.fopt');
  if (cards[optIdx]) cards[optIdx].classList.add('selected');
  setTimeout(() => {
    fbStep++;
    if (fbStep >= fbQuestions.length) {
      // Show final comment step.
      document.getElementById('fmodal-progress').textContent = '最后一步';
      document.getElementById('fmodal-question').style.display = 'none';
      document.getElementById('fmodal-options').style.display = 'none';
      document.getElementById('fmodal-final').style.display = 'flex';
    } else {
      renderFbStep();
    }
  }, 180);
}

function fbBack() {
  if (fbStep > 0) {
    fbStep = Math.max(0, fbStep - 1);
    document.getElementById('fmodal-final').style.display = 'none';
    document.getElementById('fmodal-options').style.display = 'flex';
    document.getElementById('fmodal-question').style.display = 'block';
    renderFbStep();
  }
}

async function submitFeedback() {
  if (!currentTaskId) return;
  const rating = fbAnswers._rating || 3;
  const aspects = Object.fromEntries(
    Object.entries(fbAnswers).filter(([k]) => k !== '_rating')
  );
  const comment = document.getElementById('fmodal-comment').value.trim();
  const btn = document.getElementById('fmodal-submit');
  const status = document.getElementById('fmodal-status');
  btn.disabled = true;
  btn.textContent = '提交中…';
  try {
    await apiFetch(`/feedback/${encodeURIComponent(currentTaskId)}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({rating, comment, aspects}),
    });
    status.style.color = 'var(--green)';
    status.textContent = '✓ 已收到，谢谢';
    btn.textContent = '已提交';
    // Update trigger button to reflect submitted state.
    const trigger = document.getElementById('feedback-trigger');
    if (trigger) trigger.innerHTML = '<span style="color:var(--muted);font-size:12px">✓ 反馈已提交</span>';
    setTimeout(closeFeedbackModal, 1200);
  } catch(e) {
    status.style.color = 'var(--red)';
    status.textContent = '✗ ' + e.message;
    btn.disabled = false;
    btn.textContent = '提交反馈';
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────

checkGate();
setInterval(checkGate, 60000);
</script>
