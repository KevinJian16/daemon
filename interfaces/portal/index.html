<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daemon</title>
<style>
/* ── Variables ─────────────────────────────────────────── */
:root {
  --bg:      #faf9f7;
  --surface: #f0ece3;
  --hover:   #e8e3da;
  --border:  #e2ddd5;
  --text:    #1c1917;
  --muted:   #78716c;
  --accent:  #c96940;
  --accent-s:rgba(201,105,64,.1);
  --green:   #15803d;
  --amber:   #b45309;
  --red:     #b91c1c;
  --blue:    #1d4ed8;
  --sw: 256px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'SF Mono','Fira Code',monospace;
  --r: 10px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:      #1c1917;
    --surface: #231f1c;
    --hover:   #2c2723;
    --border:  #3a3530;
    --text:    #f5f0e8;
    --muted:   #a8a29e;
    --accent:  #e8a07a;
    --accent-s:rgba(232,160,122,.1);
    --green:   #4ade80;
    --amber:   #fbbf24;
    --red:     #f87171;
    --blue:    #93c5fd;
  }
}

/* ── Reset ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);height:100dvh;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}
input,textarea{font-family:inherit}

/* ── App shell ─────────────────────────────────────────── */
#app{display:flex;height:100dvh}

/* ── Sidebar ────────────────────────────────────────────── */
#sidebar{
  width:var(--sw);flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
#sb-header{
  display:flex;align-items:center;gap:6px;
  padding:14px 14px 10px;flex-shrink:0;
}
#brand{font-size:14px;font-weight:600;letter-spacing:-.2px;flex:1}
#gate-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;transition:background .3s}
#gate-dot.yellow{background:var(--amber)}
#gate-dot.red{background:var(--red)}

.icon-btn{
  color:var(--muted);font-size:13px;
  padding:4px 7px;border-radius:6px;
  transition:background .12s,color .12s;
}
.icon-btn:hover{background:var(--hover);color:var(--text)}

#sb-nav{flex:1;overflow-y:auto;padding:4px 0 16px}
#sb-nav::-webkit-scrollbar{width:3px}
#sb-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.nav-section{margin-top:2px}
.nav-section-label{
  display:flex;align-items:center;gap:6px;
  padding:8px 14px 3px;
  font-size:10px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.7px;
  cursor:default;user-select:none;
}
.nav-section-label.collapsible{cursor:pointer}
.nav-section-label.collapsible:hover{color:var(--text)}
.collapse-chevron{margin-left:auto;font-size:9px;transition:transform .2s;color:var(--muted)}
.collapsed .collapse-chevron{transform:rotate(-90deg)}
.collapsible-body{overflow:hidden}
.collapsed .collapsible-body{display:none}
.time-group-label{
  padding:6px 14px 2px;
  font-size:10px;font-weight:600;color:var(--muted);
  display:flex;align-items:center;gap:5px;cursor:pointer;
  user-select:none;letter-spacing:.5px;
  transition:color .12s;
}
.time-group-label:hover{color:var(--text)}
.time-group-label .tg-chevron{font-size:9px;margin-left:auto;transition:transform .18s}
.time-group.collapsed .tg-chevron{transform:rotate(-90deg)}
.time-group.collapsed .time-group-body{display:none}
.pending-badge{
  background:var(--amber);color:#fff;
  font-size:10px;font-weight:700;
  padding:1px 5px;border-radius:10px;line-height:1.5;
}
.nav-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 14px;cursor:pointer;
  transition:background .1s;min-width:0;
}
.nav-item:hover{background:var(--hover)}
.nav-item.active{background:var(--accent-s)}
.n-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.d-amber{background:var(--amber)}
.d-blue {background:var(--blue)}
.d-green{background:var(--green)}
.d-muted{background:var(--muted);opacity:.4}
.n-title{flex:1;font-size:13px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.3}
.n-time{font-size:11px;color:var(--muted);flex-shrink:0}
.n-scale{font-size:10px;color:var(--muted);border:1px solid var(--border);border-radius:3px;padding:1px 4px;flex-shrink:0}
.nav-empty{padding:6px 14px;font-size:12px;color:var(--muted)}

/* ── Main ───────────────────────────────────────────────── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── Compose ────────────────────────────────────────────── */
#view-compose{
  flex:1;display:flex;flex-direction:column;
  align-items:center;overflow:hidden;
}
#compose-scroll{
  flex:1;overflow-y:auto;width:100%;
  display:flex;flex-direction:column;align-items:center;
}
#compose-empty-state{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:48px 24px 0;gap:6px;
  pointer-events:none;
}
#compose-empty-state h2{font-size:22px;font-weight:600;letter-spacing:-.3px}
#compose-empty-state p{font-size:14px;color:var(--muted);text-align:center;max-width:360px;line-height:1.6}
#chat-history{
  width:100%;max-width:680px;
  padding:24px 20px 8px;
  display:flex;flex-direction:column;gap:10px;
}
.cmsg{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.65;max-width:88%}
.cmsg.user{
  align-self:flex-end;
  background:var(--accent);color:#fff;
  border-radius:14px 14px 3px 14px;
}
.cmsg.assistant{
  align-self:flex-start;
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px 14px 14px 3px;
}
.cmsg.system{align-self:center;color:var(--muted);font-size:12px;font-style:italic;background:none;padding:4px}
.cmsg pre{background:rgba(0,0,0,.06);padding:8px 10px;border-radius:6px;font-family:var(--mono);font-size:12px;margin-top:6px;white-space:pre-wrap;overflow-x:auto}
@media(prefers-color-scheme:dark){
  .cmsg.assistant{background:var(--hover)}
  .cmsg pre{background:rgba(255,255,255,.06)}
}

/* Plan card */
#plan-card{
  width:100%;max-width:680px;margin:0 20px 8px;
  border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;display:none;flex-shrink:0;
}
#plan-card-hdr{
  padding:9px 14px;background:var(--hover);
  border-bottom:1px solid var(--border);
  font-size:11px;font-weight:600;color:var(--muted);
  display:flex;align-items:center;gap:6px;
}
#plan-card-body{padding:12px 14px}
#plan-summary{font-size:13px;line-height:1.5}
#plan-scale{font-size:11px;color:var(--muted);margin-top:3px}
#plan-btns{display:flex;gap:8px;margin-top:10px}

/* Compose input area */
#compose-bottom{
  width:100%;max-width:680px;
  padding:8px 20px 24px;flex-shrink:0;
}
#compose-box{
  border:1px solid var(--border);
  border-radius:14px;background:var(--surface);
  box-shadow:0 2px 12px rgba(0,0,0,.06);
  transition:box-shadow .2s;
  overflow:hidden;
}
#compose-box:focus-within{
  box-shadow:0 4px 20px rgba(0,0,0,.1);
  border-color:rgba(201,105,64,.35);
}
@media(prefers-color-scheme:dark){
  #compose-box{box-shadow:0 2px 12px rgba(0,0,0,.3)}
  #compose-box:focus-within{box-shadow:0 4px 20px rgba(0,0,0,.5)}
}
#compose-file-chips{display:flex;flex-wrap:wrap;gap:5px;padding:10px 14px 0}
#compose-file-chips:empty{display:none}
.fchip{
  display:flex;align-items:center;gap:4px;
  background:var(--hover);border:1px solid var(--border);
  border-radius:5px;padding:2px 8px;font-size:11px;color:var(--muted);
}
.fchip button{color:var(--muted);font-size:13px;padding:0;line-height:1}
#compose-textarea{
  width:100%;background:none;border:none;
  color:var(--text);font-size:14px;
  padding:12px 14px 8px;resize:none;outline:none;
  min-height:22px;max-height:140px;line-height:1.55;
}
#compose-textarea::placeholder{color:var(--muted)}
#compose-actions{
  display:flex;align-items:center;gap:6px;
  padding:6px 10px 10px;
}
#compose-attach-btn{
  color:var(--muted);font-size:17px;padding:4px 6px;
  border-radius:6px;transition:color .12s,background .12s;
  line-height:1;
}
#compose-attach-btn:hover{color:var(--text);background:var(--hover)}
#compose-file-input{display:none}
#compose-send-btn{
  margin-left:auto;
  background:var(--accent);color:#fff;
  border-radius:8px;padding:6px 16px;
  font-size:13px;font-weight:500;
  transition:opacity .15s;
}
#compose-send-btn:hover{opacity:.88}
#compose-send-btn:disabled{opacity:.3;cursor:default}

/* ── Detail view ────────────────────────────────────────── */
#view-detail{flex:1;display:flex;flex-direction:column;overflow:hidden;display:none}
#det-header{padding:20px 28px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
#det-title{font-size:17px;font-weight:600;line-height:1.3;margin-bottom:8px}
#det-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sbadge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;
}
.s-running {background:rgba(29,78,216,.1);color:var(--blue)}
.s-queued  {background:var(--hover);color:var(--muted)}
.s-completed,.s-done{background:rgba(21,128,61,.1);color:var(--green)}
.s-failed,.s-error{background:rgba(185,28,28,.1);color:var(--red)}
.s-cancelled{background:var(--hover);color:var(--muted)}
.s-pending_review{background:rgba(180,83,9,.1);color:var(--amber)}
.det-time{font-size:12px;color:var(--muted)}
.scale-tag{font-size:10px;color:var(--muted);border:1px solid var(--border);border-radius:3px;padding:1px 5px}

#det-controls{
  display:flex;gap:8px;padding:10px 28px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
#det-controls.hidden{display:none}

#det-body{flex:1;overflow-y:auto;padding:24px 28px}

.prog-track{background:var(--hover);border-radius:4px;height:3px;margin:12px 0;overflow:hidden}
.prog-fill{height:100%;background:var(--blue);border-radius:4px;transition:width .5s ease}

/* Campaign milestones */
#ms-timeline{margin-bottom:28px}
#ms-timeline h3{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.ms-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.ms-row:last-child{border-bottom:none}
.ms-num{
  width:20px;height:20px;border-radius:50%;
  font-size:10px;font-weight:600;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--hover);color:var(--muted);margin-top:1px;
}
.ms-num.done{background:rgba(21,128,61,.12);color:var(--green)}
.ms-num.active{background:rgba(29,78,216,.12);color:var(--blue)}
.ms-num.needs-review{background:rgba(180,83,9,.12);color:var(--amber)}
.ms-name{font-size:13px;font-weight:500}
.ms-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* Output */
#output-body{font-size:14px;line-height:1.75}
#output-body h1{font-size:22px;font-weight:700;margin:0 0 16px}
#output-body h2{font-size:17px;font-weight:600;margin:24px 0 10px}
#output-body h3{font-size:15px;font-weight:600;margin:18px 0 8px;color:var(--muted)}
#output-body p{margin-bottom:12px}
#output-body ul,#output-body ol{margin:8px 0 12px 22px}
#output-body li{margin-bottom:4px}
#output-body code{font-family:var(--mono);font-size:12px;background:var(--hover);padding:2px 5px;border-radius:4px}
#output-body pre{background:var(--hover);padding:14px 16px;border-radius:var(--r);overflow-x:auto;font-family:var(--mono);font-size:12px;margin:12px 0}
#output-body pre code{background:none;padding:0}
#output-body blockquote{border-left:3px solid var(--border);padding-left:14px;color:var(--muted);margin:12px 0}
#output-body iframe{width:100%;min-height:480px;border:1px solid var(--border);border-radius:var(--r);display:block}

/* ── Rating ─────────────────────────────────────────────── */
#rating-wrap{margin-top:36px;padding-top:24px;border-top:1px solid var(--border)}
#rating-wrap h3{font-size:13px;font-weight:600;margin-bottom:12px}
#q-choices{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.q-choice{
  background:var(--hover);border:1px solid var(--border);
  border-radius:20px;padding:6px 16px;
  font-size:13px;cursor:pointer;transition:all .15s;
  color:var(--text);font-family:inherit;
}
.q-choice:hover{border-color:var(--accent);color:var(--accent)}
.q-choice.sel{background:var(--accent-s);border-color:var(--accent);color:var(--accent);font-weight:500}
#rating-existing{font-size:12px;color:var(--muted);margin-bottom:10px}
#rating-row{display:flex;align-items:center;gap:10px;margin-top:0;flex-wrap:wrap}
#rating-deep-btn{color:var(--accent);font-size:12px;padding:0}
#rating-deep-btn:hover{text-decoration:underline}
#rating-status{font-size:12px;color:var(--muted)}
#rating-status.ok{color:var(--green)}
#deep-wrap{display:none;margin-top:14px}
#deep-wrap.open{display:block}
#deep-note{
  width:100%;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);padding:10px 14px;
  font-size:13px;resize:vertical;
  min-height:72px;outline:none;
  transition:border-color .15s;font-family:inherit;
}
#deep-note:focus{border-color:var(--accent)}
#append-wrap{display:none;margin-top:14px;padding-top:12px;border-top:1px dashed var(--border)}
#append-wrap h4{font-size:12px;font-weight:600;color:var(--muted);margin:0 0 8px}
#rating-history{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.rating-h-row{font-size:12px;color:var(--muted);line-height:1.5}
.rating-h-row strong{color:var(--text)}
#append-note{
  width:100%;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);padding:10px 14px;
  font-size:13px;resize:vertical;min-height:64px;outline:none;
  transition:border-color .15s;font-family:inherit;
}
#append-note:focus{border-color:var(--accent)}
#append-row{display:flex;align-items:center;gap:10px;margin-top:8px}
#append-status{font-size:12px;color:var(--muted)}
#append-status.ok{color:var(--green)}

/* ── Buttons ─────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  border-radius:8px;padding:7px 14px;
  font-size:13px;font-weight:500;
  transition:opacity .15s,background .15s;cursor:pointer;border:none;
}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.3;cursor:default}
.btn-primary{background:var(--accent);color:#fff}
.btn-ghost{background:var(--hover);border:1px solid var(--border);color:var(--text)}
.btn-danger{background:rgba(185,28,28,.1);color:var(--red);border:1px solid rgba(185,28,28,.15)}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px}

/* ── Mobile ─────────────────────────────────────────────── */
@media(max-width:680px){
  #sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:42dvh}
  #app{flex-direction:column}
  #det-header{padding:14px 16px 10px}
  #det-body{padding:16px}
  #det-controls{padding:8px 16px}
  #compose-bottom{padding:8px 12px 16px}
}
</style>
</head>
<body>
<div id="app">

<!-- ── Sidebar ── -->
<aside id="sidebar">
  <div id="sb-header">
    <span id="brand">Daemon</span>
    <span id="gate-dot" title="Gate: GREEN"></span>
    <button class="icon-btn" id="lang-btn" onclick="toggleLang()">EN</button>
    <a class="icon-btn" href="/console/" id="console-link">Console</a>
    <button class="icon-btn" id="compose-btn" onclick="showCompose()" title="新建任务">✏</button>
  </div>

  <nav id="sb-nav">
    <div class="nav-section" id="sec-pending">
      <div class="nav-section-label">
        <span data-i18n="pending">待处理</span>
        <span class="pending-badge" id="pending-badge" style="display:none"></span>
      </div>
      <div id="pending-list"><div class="nav-empty" data-i18n="none">暂无</div></div>
    </div>

    <div class="nav-section" id="sec-running">
      <div class="nav-section-label" data-i18n="running">进行中</div>
      <div id="running-list"><div class="nav-empty" data-i18n="none">暂无</div></div>
    </div>

    <div class="nav-section" id="sec-history">
      <div class="nav-section-label">
        <span data-i18n="history">历史</span>
      </div>
      <div id="history-search-wrap" style="padding:2px 10px 6px">
        <input id="history-search" type="search"
          placeholder="搜索…" data-ph-zh="搜索…" data-ph-en="Search…"
          oninput="filterHistory(this.value)"
          style="width:100%;background:var(--hover);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:12px;color:var(--text);outline:none;transition:border-color .15s"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
      </div>
      <div id="history-groups"></div>
    </div>
  </nav>
</aside>

<!-- ── Main ── -->
<main id="main">

  <!-- Compose view -->
  <div id="view-compose" style="display:flex;flex-direction:column;flex:1;overflow:hidden;align-items:center">
    <div id="compose-scroll" style="flex:1;overflow-y:auto;width:100%;display:flex;flex-direction:column;align-items:center">
      <div id="compose-empty">
        <div style="height:15vh"></div>
        <div style="text-align:center;pointer-events:none">
          <div style="font-size:24px;font-weight:600;letter-spacing:-.3px;margin-bottom:6px" data-i18n="composeTitle">需要做什么？</div>
          <div style="font-size:14px;color:var(--muted);max-width:560px;line-height:1.6;margin:0 auto;text-wrap:balance" data-i18n="composeHint">描述你的任务，系统自动判断规模和分配 agent。</div>
        </div>
      </div>
      <div id="chat-history" style="width:100%;max-width:680px;padding:16px 20px 0;display:flex;flex-direction:column;gap:10px"></div>
      <div id="plan-card" style="width:100%;max-width:680px;margin:8px 20px 0;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;display:none">
        <div id="plan-card-hdr" style="padding:8px 14px;background:var(--hover);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:6px">
          <span>⚡</span><span data-i18n="planDetected">检测到任务计划</span>
        </div>
        <div style="padding:12px 14px">
          <div id="plan-summary" style="font-size:13px;line-height:1.5"></div>
          <div id="plan-scale" style="font-size:11px;color:var(--muted);margin-top:3px"></div>
          <div style="display:flex;gap:8px;margin-top:10px">
            <button class="btn btn-primary btn-sm" id="plan-ok-btn" onclick="submitPlan()" data-i18n="submitPlan">确认提交</button>
            <button class="btn btn-ghost btn-sm" onclick="dismissPlan()" data-i18n="rewrite">重新描述</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div style="width:100%;max-width:680px;padding:8px 20px 28px;flex-shrink:0">
      <div id="compose-box">
        <div id="compose-file-chips"></div>
        <textarea id="compose-textarea" rows="1"
          placeholder="描述你的任务…"
          data-ph-zh="描述你的任务…" data-ph-en="Describe your task…"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();composeSend()}"
          oninput="autoResize(this)"></textarea>
        <div id="compose-actions">
          <button id="compose-attach-btn" id="attach-btn" onclick="document.getElementById('compose-file-input').click()">📎</button>
          <input type="file" id="compose-file-input" multiple onchange="onFilesSelected(this)">
          <button id="compose-send-btn" class="btn btn-primary btn-sm" onclick="composeSend()" data-i18n="send">发送</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail view -->
  <div id="view-detail" style="display:none;flex:1;flex-direction:column;overflow:hidden">
    <div id="det-header">
      <div id="det-title"></div>
      <div id="det-meta">
        <span id="det-status" class="sbadge"></span>
        <span id="det-scale" class="scale-tag" style="display:none"></span>

<script>
// ── i18n ──────────────────────────────────────────────────
const D = {

  },
  en:{
    pending:'Pending',running:'Running',history:'History',none:'None',
    composeTitle:'What do you need?',composeHint:'Describe your task. Daemon will choose scale and assign agents.',
    planDetected:'Task plan detected',submitPlan:'Submit',rewrite:'Rewrite',
    send:'Send',pause:'Pause',redirect:'Redirect',cancel:'Cancel Task',
    milestones:'Milestone Progress',
    rateTitle:'How was this result?',submitRating:'Submit Rating',deepFeedback:'Detailed Feedback',
    appendTitle:'Additional Feedback',appendSubmit:'Submit Follow-up',
    commentPh:'Optional: add a comment…',
    dimAlign:'Intent Alignment — did the result match your original request?',
    dimDepth:'Quality Depth — was the depth and density sufficient?',
    dimImprove:'What would you most want improved? (optional)',
    alignFull:'Fully aligned',alignMostly:'Mostly aligned',alignPartial:'Partially',alignMiss:'Missed',
    depthEx:'Exceeded expectations',depthGood:'Met needs',depthShallow:'Too shallow',depthPoor:'Insufficient',
    submitting:'Submitting…',submitOk:'Recorded ✓',cancellingMsg:'Cancelling…',cancelOk:'Cancelled',
    s_running:'Running',s_queued:'Queued',s_completed:'Completed',s_done:'Completed',
    s_failed:'Failed',s_cancelled:'Cancelled',s_pending_review:'Pending Review',
    hideDeep:'Hide detailed feedback',attachTip:'Attach file',composeTip:'New task',
    cancelConfirm:'Cancel this task?',redirectPrompt:'New direction or instruction:',
  },
};
const SHARED_LANG_KEY = 'd_lang';
const LEGACY_CONSOLE_LANG_KEY = 'c_lang';
function normLang(v){ return String(v||'').toLowerCase()==='en' ? 'en' : 'zh'; }
function readSharedLang(){
  return normLang(localStorage.getItem(SHARED_LANG_KEY) || localStorage.getItem(LEGACY_CONSOLE_LANG_KEY) || 'zh');
}
function writeSharedLang(v){
  const n = normLang(v);
  localStorage.setItem(SHARED_LANG_KEY, n);
  localStorage.setItem(LEGACY_CONSOLE_LANG_KEY, n);
  return n;
}
let lang = readSharedLang();
writeSharedLang(lang);
const t = k => D[lang][k] || D.zh[k] || k;

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
  document.querySelectorAll('[data-i18n-ph]').forEach(el => el.placeholder = t(el.dataset.i18nPh));
  document.getElementById('lang-btn').textContent = lang === 'zh' ? 'EN' : '中';
  document.querySelector('html').lang = lang;
  const ta = document.getElementById('compose-textarea');
  ta.placeholder = lang === 'zh' ? ta.dataset.phZh : ta.dataset.phEn;
  const dn = document.getElementById('deep-note');
  dn.placeholder = lang === 'zh' ? dn.dataset.phZh : dn.dataset.phEn;
  const an = document.getElementById('append-note');
  an.placeholder = lang === 'zh' ? an.dataset.phZh : an.dataset.phEn;
  document.getElementById('compose-btn').title = t('composeTip');
  document.getElementById('compose-attach-btn').title = t('attachTip');
  document.querySelectorAll('.q-choice').forEach(b => {
    b.textContent = lang === 'zh' ? b.dataset.zh : b.dataset.en;
  });
}
function toggleLang() {
  lang = writeSharedLang(lang === 'zh' ? 'en' : 'zh');
  applyI18n();
  renderNav();
}
window.addEventListener('storage', (event) => {
  if (event.key !== SHARED_LANG_KEY && event.key !== LEGACY_CONSOLE_LANG_KEY) return;
  const next = readSharedLang();
  if (next === lang) return;
  lang = next;
  applyI18n();
  renderNav();
});

// ── API ───────────────────────────────────────────────────
const API = '';
async function api(path, opts) {
  const r = await fetch(API + path, opts);
  if (!r.ok) { const txt = await r.text(); throw new Error(txt || r.status); }
  return r.json();
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,140)+'px'}

// ── Markdown ──────────────────────────────────────────────
function md(s) {
  let h = String(s||'');
  h = h.replace(/```[\w]*\n?([\s\S]*?)```/g,(_,c)=>`<pre><code>${esc(c.trim())}</code></pre>`);
  h = h.replace(/`([^`]+)`/g,(_,c)=>`<code>${esc(c)}</code>`);
  h = h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  h = h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h = h.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  h = h.replace(/^[-*] (.+)$/gm,'<li>$1</li>').replace(/(<li>[\s\S]*<\/li>)/,'<ul>$1</ul>');
  h = h.replace(/\n\n+/g,'</p><p>');
  return '<p>'+h+'</p>';
}

// ── Views ─────────────────────────────────────────────────
function showCompose() {

  document.getElementById('view-compose').style.display = 'flex';
  document.getElementById('view-detail').style.display = 'none';

}
function showDetail() {
  document.getElementById('view-compose').style.display = 'none';

}
function clearActive() {
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
}

// ── Gate ──────────────────────────────────────────────────
async function checkGate() {
  try {
    const d = await api('/health');
    const g = (d.gate||'GREEN').toUpperCase();
    const dot = document.getElementById('gate-dot');
    dot.className = g==='RED'?'red':g==='YELLOW'?'yellow':'';
    dot.title = 'Gate: '+g;
  } catch(e) { document.getElementById('gate-dot').className='red'; }
}

// ── Nav data ──────────────────────────────────────────────
let tasks=[], outcomes=[];
let curTaskId=null;

function dotCls(s){ return s==='pending_review'?'d-amber':s==='running'?'d-blue':s==='completed'||s==='done'?'d-green':'d-muted'; }
function sLabel(s){ return t('s_'+(s||'').replace('-','_')) || s; }
function relTime(u){
  if(!u) return '';
  const diff=(Date.now()-new Date(u.replace(' ','T').replace(/(?<!\+\d{2})$/,'Z')))/1000;
  if(diff<60) return '<1m';
  if(diff<3600) return Math.floor(diff/60)+'m';
  if(diff<86400) return Math.floor(diff/3600)+'h';
  return Math.floor(diff/86400)+'d';
}

function makeItem(task_id, title, scale, status, time, onClick) {
  const el = document.createElement('div');
  el.className = 'nav-item'; el.dataset.id = task_id;
  el.innerHTML = `<span class="n-dot ${dotCls(status)}"></span>
    <span class="n-title">${esc(title||task_id)}</span>
    ${scale?`<span class="n-scale">${esc(scale)}</span>`:''}
    <span class="n-time">${esc(relTime(time))}</span>`;
  el.onclick = onClick;
  return el;
}

async function renderNav() {
  try { tasks = await api('/tasks?limit=200'); } catch(e){ tasks=[]; }
  try { outcomes = await api('/outcome?limit=200'); } catch(e){ outcomes=[]; }
  let pendFb = [];
  try { pendFb = await api('/feedback/pending?limit=50'); } catch(e){}
  const fbIds = new Set((pendFb||[]).map(x=>x.task_id));

  const pending = tasks.filter(t=>fbIds.has(t.task_id)||t.status==='pending_review');
  const pendIds = new Set(pending.map(t=>t.task_id));
  const running = tasks.filter(t=>['running','queued'].includes(t.status)&&!pendIds.has(t.task_id));
  const histOut = outcomes.filter(o=>!pendIds.has(o.task_id));

  // Pending
  const pb = document.getElementById('pending-badge');
  const pl = document.getElementById('pending-list');
  if(pending.length){
    pb.textContent=pending.length; pb.style.display='';
    pl.innerHTML='';
    pending.forEach(tk=>{
      const el=makeItem(tk.task_id,tk.title||tk.task_type||tk.task_id,tk.task_scale,'pending_review',tk.created_utc,()=>openTask(tk,el));
      pl.appendChild(el);
    });
  } else {
    pb.style.display='none';
    pl.innerHTML=`<div class="nav-empty">${t('none')}</div>`;
  }

  // Running
  const rl=document.getElementById('running-list');
  if(running.length){
    rl.innerHTML='';
    running.forEach(tk=>{
      const el=makeItem(tk.task_id,tk.title||tk.task_type||tk.task_id,tk.task_scale,tk.status,tk.created_utc,()=>openTask(tk,el));
      rl.appendChild(el);
    });
  } else {
    rl.innerHTML=`<div class="nav-empty">${t('none')}</div>`;
  }

  // History
  histAllOutcomes=histOut;
  renderHistoryGrouped(histOut);
  // Update search placeholder for current lang
  const hs=document.getElementById('history-search');
  if(hs) hs.placeholder=lang==='zh'?hs.dataset.phZh:hs.dataset.phEn;
}

// ── Open task ─────────────────────────────────────────────
async function openTask(task, navEl) {
  clearActive(); if(navEl) navEl.classList.add('active');
  curTaskId=task.task_id;
  document.getElementById('det-title').textContent = task.title||task.task_type||task.task_id;
  setBadge(task.status);
  const sc=document.getElementById('det-scale');
  if(task.task_scale){sc.textContent=task.task_scale;sc.style.display='';}else sc.style.display='none';
  document.getElementById('det-time').textContent = relTime(task.created_utc);

  const isRunning=['running','queued'].includes(task.status);
  const ctrl=document.getElementById('det-controls');
  if(isRunning){
    ctrl.classList.remove('hidden');
    ['btn-pause','btn-redirect','btn-cancel'].forEach(id=>document.getElementById(id).style.display='');
  } else ctrl.classList.add('hidden');

  const pw=document.getElementById('prog-wrap');
  if(isRunning){
    pw.style.display='block';
    const pct=task.progress_pct||(task.step_index&&task.total_steps?Math.round(task.step_index/task.total_steps*100):0);
    document.getElementById('prog-fill').style.width=pct+'%';
    document.getElementById('prog-label').textContent=task.current_step||'';
  } else pw.style.display='none';

  document.getElementById('output-body').innerHTML='<p style="color:var(--muted);font-size:13px">Loading…</p>';
  document.getElementById('ms-timeline').style.display='none';
  document.getElementById('rating-wrap').style.display='none';
  showDetail();

  if(task.task_scale==='campaign'){
    try{ const c=await api('/campaigns/'+task.task_id); renderCampaign(c); }catch(e){ document.getElementById('output-body').innerHTML=''; }
    return;
  }
  const match=outcomes.find(o=>o.task_id===task.task_id);
  if(match) await renderOutcomeContent(match);
  else if(isRunning) document.getElementById('output-body').innerHTML=`<p style="color:var(--muted);font-size:13px">${esc(task.current_step||'Task is running…')}</p>`;
  else document.getElementById('output-body').innerHTML=`<p style="color:var(--muted);font-size:13px">No output yet.</p>`;
}

async function openOutcome(outcome, navEl) {
  clearActive(); if(navEl) navEl.classList.add('active');
  curTaskId=outcome.task_id;
  document.getElementById('det-title').textContent=outcome.title||outcome.task_id;
  setBadge('completed');
  const sc=document.getElementById('det-scale');
  if(outcome.task_type){sc.textContent=outcome.task_type;sc.style.display='';}else sc.style.display='none';
  document.getElementById('det-time').textContent=relTime(outcome.delivered_utc||outcome.archived_utc);
  document.getElementById('det-controls').classList.add('hidden');
  document.getElementById('prog-wrap').style.display='none';
  document.getElementById('ms-timeline').style.display='none';
  showDetail();
  await renderOutcomeContent(outcome);
}

async function renderOutcomeContent(outcome) {
  const body=document.getElementById('output-body');
  body.innerHTML='<p style="color:var(--muted);font-size:13px">Loading…</p>';
  const path=(outcome.path||'').replace(/^\/|\/+$/g,'');
  try {
    const hr=await fetch(API+'/outcome/'+path+'/report.html');
    if(hr.ok){
      body.innerHTML='';
      const fr=document.createElement('iframe');
      fr.style.cssText='width:100%;min-height:480px;border:1px solid var(--border);border-radius:var(--r);display:block;background:white';
      fr.srcdoc=await hr.text();
      body.appendChild(fr);
      await showRating(outcome.task_id); return;
    }
    const mr=await fetch(API+'/outcome/'+path+'/report.md');
    if(mr.ok){ body.innerHTML=md(await mr.text()); await showRating(outcome.task_id); return; }
    const mfr=await fetch(API+'/outcome/'+path+'/manifest.json');
    if(mfr.ok){
      const mf=await mfr.json();
      if(!curTaskId&&mf.task_id) curTaskId=mf.task_id;
      body.innerHTML=`<pre>${esc(JSON.stringify(mf,null,2))}</pre>`;
      await showRating(curTaskId); return;
    }
    body.innerHTML='<p style="color:var(--muted)">No preview available.</p>';
  } catch(e){ body.innerHTML=`<p style="color:var(--red)">Error: ${esc(e.message)}</p>`; }
}

function renderCampaign(c) {
  const ms=c.milestones||[];
  if(ms.length){
    const tl=document.getElementById('ms-timeline');
    const ml=document.getElementById('ms-list');
    ml.innerHTML='';
    ms.forEach((m,i)=>{
      const cls=m.status==='completed'?'done':m.status==='running'?'active':m.status==='pending_review'?'needs-review':'';
      const row=document.createElement('div'); row.className='ms-row';
      row.innerHTML=`<div class="ms-num ${cls}">${i+1}</div>
        <div><div class="ms-name">${esc(m.name||'Milestone '+(i+1))}</div>
        <div class="ms-sub">${esc(m.status||'')}${m.completed_utc?' · '+relTime(m.completed_utc):''}</div></div>`;
      ml.appendChild(row);
    });
    tl.style.display='block';
  }
  document.getElementById('output-body').innerHTML=c.summary?md(c.summary):'';
}

function setBadge(s) {
  const b=document.getElementById('det-status');
  b.textContent=sLabel(s);
  b.className='sbadge s-'+s;
}

// ── Rating ────────────────────────────────────────────────
let quickChoice=null; // {v, label}
function refreshRatingSubmitEnabled(){
  const btn=document.getElementById('rating-ok-btn');
  if(!btn) return;
  const note=(document.getElementById('deep-note')?.value||'').trim();
  btn.disabled=!(quickChoice||note);
}
function pickChoice(el){
  document.querySelectorAll('.q-choice').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  quickChoice={v:parseInt(el.dataset.v,10), label:el.textContent.trim()};
  refreshRatingSubmitEnabled();
}
function choiceLabel(v){
  const target=String(v||'').trim();
  const btn=[...document.querySelectorAll('.q-choice')].find(b=>String(b.dataset.v||'')===target);
  return btn ? btn.textContent.trim() : target;
}
function renderFeedbackHistory(rows){
  const box=document.getElementById('rating-history');
  if(!rows || !rows.length){ box.innerHTML=''; return; }
  box.innerHTML=rows.map(r=>{
    const when=relTime(r.created_utc||'');
    const label=(lang==='zh'?'来源':'Source')+': '+esc(r.source||'user');
    const rating=(r.rating!=null&&r.rating!=='')?`<strong>${esc(choiceLabel(r.rating))}</strong>`:'';
    const comment=r.comment?` ${esc(r.comment)}`:'';
    return `<div class="rating-h-row">${when} · ${label} ${rating}${comment}</div>`;
  }).join('');
}
async function showRating(tid){
  curTaskId=tid||curTaskId;
  if(!curTaskId) return;
  const w=document.getElementById('rating-wrap'); w.style.display='block';
  const qWrap=document.getElementById('q-choices');
  const deepBtn=document.getElementById('rating-deep-btn');
  const deepWrap=document.getElementById('deep-wrap');
  const appendWrap=document.getElementById('append-wrap');
  const appendStatus=document.getElementById('append-status');
  const appendNote=document.getElementById('append-note');
  const ratingBtn=document.getElementById('rating-ok-btn');
  quickChoice=null;
  document.querySelectorAll('.q-choice').forEach(b=>b.classList.remove('sel'));
  ratingBtn.disabled=true;
  deepWrap.classList.remove('open');
  document.getElementById('deep-note').value='';
  document.getElementById('rating-status').textContent='';
  document.getElementById('rating-status').className='';
  appendStatus.textContent='';
  appendStatus.className='';
  appendNote.value='';
  const ex=document.getElementById('rating-existing');
  ex.textContent='';

  let state={};
  try{ state=await api('/feedback/'+curTaskId+'/state'); }catch(e){ state={}; }
  const response=(state&&state.response)||{};
  const history=(state&&Array.isArray(state.history))?state.history:[];
  const submitted=String((state&&state.status)||'').toLowerCase()==='submitted';
  const hasMain=submitted||(
    response &&
    (
      (response.rating!=null && response.rating!=='') ||
      String(response.comment||'').trim().length>0
    )
  );

  if(hasMain){
    if(response.rating!=null && response.rating!==''){
      ex.textContent=(lang==='zh'?'已评价：':'Rated: ')+choiceLabel(response.rating)+(response.comment?` · ${response.comment}`:'');
    }else{
      ex.textContent=(lang==='zh'?'已提交详细评价':'Detailed feedback submitted')+(response.comment?` · ${response.comment}`:'');
    }
    qWrap.style.display='none';
    ratingBtn.style.display='none';
    deepBtn.style.display='none';
    deepWrap.classList.remove('open');
    deepWrap.style.display='none';
    appendWrap.style.display='block';
    renderFeedbackHistory(history);
  }else{
    qWrap.style.display='flex';
    ratingBtn.style.display='inline-flex';
    deepBtn.style.display='inline';
    deepWrap.classList.remove('open');
    deepWrap.style.display='';
    appendWrap.style.display='none';
    renderFeedbackHistory([]);
    refreshRatingSubmitEnabled();
  }
}
function toggleDeep(){
  const el=document.getElementById('deep-wrap');
  el.classList.toggle('open');
  refreshRatingSubmitEnabled();
}
async function submitRating(){
  if(!curTaskId) return;
  const btn=document.getElementById('rating-ok-btn');
  const st=document.getElementById('rating-status');
  btn.disabled=true; st.textContent=t('submitting'); st.className='';
  const note=document.getElementById('deep-note').value.trim();
  const payload={source:'portal'};
  if(quickChoice){
    payload.rating=quickChoice.v;
    payload.type=note?'deep':'quick';
  }else if(note){
    payload.type='deep';
  }else{
    st.textContent=''; btn.disabled=false; return;
  }
  if(note) payload.comment=note;
  try{
    await api('/feedback/'+curTaskId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    st.textContent=t('submitOk'); st.className='ok';
    await showRating(curTaskId);
    setTimeout(renderNav,500);
  }catch(e){ st.textContent='✗ '+e.message; btn.disabled=false; }
}
async function submitAppend(){
  if(!curTaskId) return;
  const note=document.getElementById('append-note').value.trim();
  if(!note) return;
  const btn=document.getElementById('append-ok-btn');
  const st=document.getElementById('append-status');
  btn.disabled=true; st.textContent=t('submitting'); st.className='';
  try{
    await api('/feedback/'+curTaskId+'/append',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({comment:note, source:'portal'}),
    });
    st.textContent=t('submitOk'); st.className='ok';
    document.getElementById('append-note').value='';
    await showRating(curTaskId);
  }catch(e){
    st.textContent='✗ '+e.message;
  }finally{
    btn.disabled=false;
  }
}

// ── Controls ──────────────────────────────────────────────
async function taskCancel(){
  if(!curTaskId||!confirm(t('cancelConfirm'))) return;
  const btn=document.getElementById('btn-cancel');
  btn.disabled=true; btn.textContent=t('cancellingMsg');
  try{ await api('/tasks/'+curTaskId+'/cancel',{method:'POST'}); btn.textContent=t('cancelOk'); setTimeout(renderNav,800); }
  catch(e){ btn.textContent=t('cancel'); btn.disabled=false; alert('Error: '+e.message); }
}
async function taskPause(){
  if(!curTaskId) return;
  try{ await api('/tasks/'+curTaskId+'/pause',{method:'POST'}); renderNav(); }
  catch(e){ alert('Error: '+e.message); }
}
async function taskRedirect(){
  if(!curTaskId) return;
  const ins=prompt(t('redirectPrompt')); if(!ins) return;
  try{ await api('/tasks/'+curTaskId+'/redirect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({instruction:ins})}); renderNav(); }
  catch(e){ alert('Error: '+e.message); }
}

// ── Compose ───────────────────────────────────────────────
let sessId=null, detPlan=null, attachFiles=[];

function addMsg(role, text) {
  const hist=document.getElementById('chat-history');
  // Hide empty state once messages appear
  document.getElementById('compose-empty').style.display='none';
  const div=document.createElement('div'); div.className='cmsg '+role;
  if(role==='assistant') div.innerHTML=md(text); else div.textContent=text;
  hist.appendChild(div);
  div.scrollIntoView({behavior:'smooth',block:'end'});
  return div;
}

async function composeSend(){
  const ta=document.getElementById('compose-textarea');
  const msg=ta.value.trim(); if(!msg) return;
  const btn=document.getElementById('compose-send-btn');
  btn.disabled=true; ta.value=''; ta.style.height='auto';
  addMsg('user',msg);
  const thinking=addMsg('system','…');
  try{
    if(!sessId){ const s=await api('/chat/session',{method:'POST'}); sessId=s.session_id; }
    const d=await api('/chat/'+sessId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    thinking.remove(); addMsg('assistant',d.content||'');
    if(d.plan) showPlanCard(d.plan);
  }catch(e){ thinking.remove(); addMsg('system','✗ '+e.message); }
  finally{ btn.disabled=false; ta.focus(); }
}
function showPlanCard(plan){
  detPlan=plan;
  const c=document.getElementById('plan-card'); c.style.display='block';
  document.getElementById('plan-summary').textContent=plan.objective||plan.intent||plan.task_type||JSON.stringify(plan).slice(0,120);
  document.getElementById('plan-scale').textContent=plan.task_scale?'Scale: '+plan.task_scale:'';
}
function dismissPlan(){ detPlan=null; document.getElementById('plan-card').style.display='none'; }
async function submitPlan(){
  if(!detPlan) return;
  const btn=document.getElementById('plan-ok-btn'); btn.disabled=true; btn.textContent='…';
  try{
    const d=await api('/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(detPlan)});
    dismissPlan(); addMsg('system','✓ Submitted — '+(d.task_id||''));
    sessId=null; setTimeout(renderNav,600);
  }catch(e){ addMsg('system','✗ '+e.message); btn.disabled=false; btn.textContent=t('submitPlan'); }
}
function onFilesSelected(inp){
  Array.from(inp.files).forEach(f=>{ if(!attachFiles.find(x=>x.name===f.name)) attachFiles.push(f); });
  inp.value=''; renderChips();
}
function renderChips(){
  document.getElementById('compose-file-chips').innerHTML=attachFiles.map((f,i)=>`
    <div class="fchip"><span>${esc(f.name)}</span><button onclick="rmFile(${i})">×</button></div>`).join('');
}
function rmFile(i){ attachFiles.splice(i,1); renderChips(); }

// ── History grouped + search ──────────────────────────────
let histAllOutcomes=[];
// Group collapse state: key=groupKey, value=bool collapsed
const histGroupState={};

function timeGroupKey(utcStr){
  if(!utcStr) return 'older';
  const d=new Date(utcStr.replace(' ','T').replace(/(?<!\+\d{2})$/,'Z'));
  const now=new Date(); const diff=(now-d)/86400000;
  if(diff<1) return 'today';
  if(diff<7) return 'week';
  if(diff<30) return 'month';
  return 'older';
}
function timeGroupLabel(key){
  const m={today:lang==='zh'?'今天':'Today',week:lang==='zh'?'本周':'This Week',month:lang==='zh'?'本月':'This Month',older:lang==='zh'?'更早':'Older'};
  return m[key]||key;
}

function renderHistoryGrouped(items){
  const container=document.getElementById('history-groups');
  container.innerHTML='';
  if(!items.length){
    container.innerHTML=`<div class="nav-empty" style="padding:6px 14px">${t('none')}</div>`;
    return;
  }
  const groups={today:[],week:[],month:[],older:[]};
  items.forEach(o=>groups[timeGroupKey(o.delivered_utc||o.archived_utc)].push(o));
  ['today','week','month','older'].forEach(key=>{
    const grpItems=groups[key]; if(!grpItems.length) return;
    // Default: 'older' is collapsed; restore saved state
    const savedKey='d_hg_'+key;
    const defCollapsed=key==='older';
    if(!(savedKey in histGroupState)){
      histGroupState[savedKey]=localStorage.getItem(savedKey)==='1'||(localStorage.getItem(savedKey)===null&&defCollapsed);
    }
    const grp=document.createElement('div'); grp.className='time-group'+(histGroupState[savedKey]?' collapsed':'');
    const lbl=document.createElement('div'); lbl.className='time-group-label';
    lbl.innerHTML=`<span>${timeGroupLabel(key)}</span><span style="color:var(--muted);font-weight:400;font-size:10px">${grpItems.length}</span><span class="tg-chevron">▾</span>`;
    lbl.onclick=()=>{
      const c=grp.classList.toggle('collapsed');
      histGroupState[savedKey]=c;
      localStorage.setItem(savedKey,c?'1':'0');
    };
    const body=document.createElement('div'); body.className='time-group-body';
    grpItems.forEach(o=>{
      const el=makeItem(o.task_id,o.title||o.task_id,o.task_type,'completed',o.delivered_utc||o.archived_utc,()=>openOutcome(o,el));
      body.appendChild(el);
    });
    grp.appendChild(lbl); grp.appendChild(body);
    container.appendChild(grp);
  });
}

function filterHistory(q){
  const query=(q||'').trim().toLowerCase();
  const container=document.getElementById('history-groups');
  if(!query){ renderHistoryGrouped(histAllOutcomes); return; }
  const filtered=histAllOutcomes.filter(o=>(o.title||o.task_id||'').toLowerCase().includes(query));
  container.innerHTML='';
  if(!filtered.length){ container.innerHTML=`<div class="nav-empty" style="padding:6px 14px">${t('none')}</div>`; return; }
  filtered.forEach(o=>{
    const el=makeItem(o.task_id,o.title||o.task_id,o.task_type,'completed',o.delivered_utc||o.archived_utc,()=>openOutcome(o,el));
    container.appendChild(el);
  });
}

// ── Boot ──────────────────────────────────────────────────
async function boot(){
  applyI18n();
  showCompose();
  await Promise.all([checkGate(), renderNav()]);
  // Auto-open first pending if any
  const first=document.querySelector('#pending-list .nav-item');
  if(first) first.click();
  setInterval(()=>{ checkGate(); renderNav(); }, 15000);
}
document.addEventListener('DOMContentLoaded', boot);
</script>
